{% extends "base.html" %}

{% block title %}StreamingS - Admin Login{% endblock %}

{% block content %}
<div class="login-container nes-container is-dark is-rounded with-title" style="border-width: 4px;">
    <h2 class="title">ADMIN ACCESS</h2>
    <div class="login-title blink-green">INSERT COIN</div>
    
    <form action="{{ url_for('admin.login') }}" method="POST">
        <div class="form-group nes-field">
            <label for="username_field">USER_NAME:</label>
            <input type="text" id="username_field" name="username" class="nes-input is-dark" placeholder="Ingresa usuario" required>
        </div>
        
        <div class="form-group nes-field">
            <label for="password_field">PASSWORD:</label>
            <input type="password" id="password_field" name="password" class="nes-input is-dark" placeholder="Ingresa contraseña" required>
        </div>
        
        <div class="btn-container">
            <button type="submit" class="nes-btn is-warning">PRESS START</button>
        </div>
    </form>
</div>
{% endblock %}
